<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>

<link rel="stylesheet" href="styles.css"/>
<script>

                    },

                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-custom-dark {
            background-color: #0B2319;
        }
        @media (max-width: 640px) {

<header class="pt-6 sm:pt-8 md:pt-10 lg:pt-12 pb-4 sm:pb-6 md:pb-8 flex justify-center items-center">

<h1 class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-900 dark:text-white mb-2 sm:mb-3 md:mb-4">
                ¿Olvidaste tu contraseña?
            </h1>
<p class="text-xs sm:text-sm text-gray-500 dark:text-gray-400 mb-4 sm:mb-6 md:mb-8 leading-relaxed">
                No te preocupes, ingresa tu correo para restablecerla.
            </p>
<form class="space-y-4 sm:space-y-5 md:space-y-6" method="POST" id="recover-form">
<div>
<label class="block text-xs sm:text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 sm:mb-2" for="email">
                        Correo Electrónico
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400 group-focus-within:text-primary dark:group-focus-within:text-gray-300 text-sm sm:text-base">mail</span>
</div>
<input class="block w-full pl-9 sm:pl-10 pr-3 py-2 sm:py-3 border border-gray-200 dark:border-zinc-700 rounded-lg bg-white dark:bg-zinc-800 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 text-sm" id="email" name="email" placeholder="Correo Electrónico" type="email" required/>
</div>
</div>
<div class="space-y-3 sm:space-y-4 pt-2">
<button class="w-full bg-primary hover:bg-black text-white font-semibold py-2.5 sm:py-3.5 rounded-lg transition-colors duration-200 shadow-sm text-sm sm:text-base" type="submit">
                        Enviar Enlace
                    </button>
<div class="text-center">
<a class="text-rose-500 hover:text-rose-600 font-medium transition-colors duration-200 text-xs sm:text-sm" href="inicio_secion.html">
                            Cancelar
                        </a>
</div>
</div>
</form>
</div>

<a href="inicio.HTML" class="flex items-center gap-1 sm:gap-2 text-white opacity-90">
<span class="material-symbols-outlined text-lg sm:text-xl">shopping_bag</span>
<span class="text-base sm:text-lg font-bold">LocalMarket</span>
</a>
<p class="text-gray-400 text-xs sm:text-sm max-w-xs mx-auto px-4">
                "Un solo lugar, muchas empresas, infinitas posibilidades."
            </p>

<p class="text-gray-500 text-[10px] sm:text-xs">

</div>
</div>
</footer>
<button class="fixed bottom-3 sm:bottom-4 right-3 sm:right-4 bg-white dark:bg-zinc-800 text-gray-800 dark:text-white p-1.5 sm:p-2 rounded-full shadow-lg hover:scale-110 transition-all" onclick="document.documentElement.classList.toggle('dark')" data-theme-toggle>
