<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LocalMarket - Iniciar Sesión</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css">
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0B2319",
                        "background-light": "#F3F4F6",
                        "background-dark": "#05110C",
                        accent: "#64A489",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-size: 20px;
        }
    </style>
</head>
<body class="bg-primary min-h-screen flex flex-col items-center justify-between p-4 md:p-8">
<header class="w-full flex justify-center pt-8 pb-12">
<a href="inicio.HTML" class="flex items-center gap-2 text-white">
<span class="material-symbols-outlined text-3xl">shopping_bag</span>
<span class="text-2xl font-bold tracking-tight">LocalMarket</span>
</a>
</header>
<main class="w-full max-w-md bg-white dark:bg-zinc-900 rounded-2xl shadow-2xl p-8 md:p-10 mb-12">
<h1 class="text-2xl font-bold text-primary dark:text-white mb-8">Iniciar Sesión</h1>
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300" for="email">
                    Correo Electrónico
                </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-accent">
<span class="material-symbols-outlined">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-gray-200 dark:border-zinc-700 rounded-lg bg-white dark:bg-zinc-800 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all" id="email" name="email" placeholder="Correo Electrónico" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300" for="password">
                    Contraseña
                </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-accent">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border border-gray-200 dark:border-zinc-700 rounded-lg bg-white dark:bg-zinc-800 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-accent hover:text-primary dark:hover:text-white transition-colors" type="button" data-toggle-password>
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary hover:bg-opacity-90 text-white font-semibold py-3 px-4 rounded-lg transition-all shadow-lg active:scale-[0.98] mt-4" type="submit">
                Iniciar Sesión
            </button>
</form>
<div class="mt-8 flex flex-col items-center space-y-4">
<a class="text-sm font-medium text-accent hover:text-primary dark:hover:text-white transition-colors" href="recuperar_contraseña.html">
                ¿Olvidaste tu contraseña?
            </a>
<div class="w-full border-t border-gray-100 dark:border-zinc-800 pt-6">
<p class="text-sm text-gray-500 dark:text-gray-400 text-center">
                    ¿No tienes cuenta? 
                    <a class="text-accent hover:text-primary dark:hover:text-white font-semibold ml-1" href="registro_usuario.html">Registrarse</a>
</p>
</div>
</div>
</main>
<footer class="w-full max-w-4xl flex flex-col items-center space-y-6 pb-8 text-white/80">
<a href="inicio.HTML" class="flex items-center gap-2 text-white">
<span class="material-symbols-outlined text-2xl">shopping_bag</span>
<span class="text-xl font-bold">LocalMarket</span>
</a>
<p class="text-center italic text-sm md:text-base font-light">
            "Un solo lugar, muchas empresas, infinitas posibilidades."
        </p>
<div class="flex gap-4">
<a class="w-10 h-10 flex items-center justify-center border border-white/20 rounded-full hover:bg-white hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined">mail</span>
</a>
<a class="w-10 h-10 flex items-center justify-center border border-white/20 rounded-full hover:bg-white hover:text-primary transition-all" href="#">
<svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"></path></svg>
</a>
<a class="w-10 h-10 flex items-center justify-center border border-white/20 rounded-full hover:bg-white hover:text-primary transition-all" href="#">

</a>
</div>
<div class="text-xs text-white/50 pt-4">
            © 2024 LocalMarket. Todos los derechos reservados.
        </div>
</footer>
