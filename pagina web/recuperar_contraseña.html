                        "background-dark": "#05110B",

<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-custom-dark flex flex-col min-h-screen">
<header class="pt-12 pb-8 flex justify-center items-center">
<a href="inicio.HTML" class="flex items-center gap-2 text-white">
<span class="material-symbols-outlined text-3xl">shopping_bag</span>

<main class="flex-grow flex items-center justify-center px-4 pb-12">
<div class="bg-white dark:bg-zinc-900 w-full max-w-md rounded-2xl shadow-2xl p-8 md:p-12">
<h1 class="text-2xl md:text-3xl font-bold text-gray-900 dark:text-white mb-4">
                ¿Olvidaste tu contraseña?
            </h1>
<p class="text-gray-500 dark:text-gray-400 mb-8 leading-relaxed">
                No te preocupes, ingresa tu correo para restablecerla.
            </p>
<form class="space-y-6" method="POST" id="recover-form">
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" for="email">
                        Correo Electrónico
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400 group-focus-within:text-primary dark:group-focus-within:text-gray-300">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-gray-200 dark:border-zinc-700 rounded-lg bg-white dark:bg-zinc-800 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200" id="email" name="email" placeholder="Correo Electrónico" type="email" required/>
</div>
</div>
<div class="space-y-4 pt-2">
<button class="w-full bg-primary hover:bg-black text-white font-semibold py-3.5 rounded-lg transition-colors duration-200 shadow-sm" type="submit">
                        Enviar Enlace
                    </button>
<div class="text-center">
<a class="text-rose-500 hover:text-rose-600 font-medium transition-colors duration-200" href="inicio_secion.html">
                            Cancelar
                        </a>
</div>
</div>
</form>
</div>
</main>
<footer class="bg-custom-dark text-center pb-12 pt-8">
<div class="flex flex-col items-center gap-6">
<a href="inicio.HTML" class="flex items-center gap-2 text-white opacity-90">
<span class="material-symbols-outlined text-xl">shopping_bag</span>
<span class="text-lg font-bold">LocalMarket</span>
</a>
<p class="text-gray-400 text-sm max-w-xs mx-auto">
                "Un solo lugar, muchas empresas, infinitas posibilidades."
            </p>
<div class="flex gap-4">
<a class="w-10 h-10 flex items-center justify-center rounded-full border border-gray-700 text-gray-300 hover:text-white hover:border-white transition-all" href="#">
<span class="material-symbols-outlined text-xl">mail</span>
</a>
<a class="w-10 h-10 flex items-center justify-center rounded-full border border-gray-700 text-gray-300 hover:text-white hover:border-white transition-all" href="#">

</div>
<div class="mt-4">
<p class="text-gray-500 text-xs">
                    © 2024 LocalMarket. Todos los derechos reservados.
                </p>
</div>
</div>
</footer>
<button class="fixed bottom-4 right-4 bg-white dark:bg-zinc-800 text-gray-800 dark:text-white p-2 rounded-full shadow-lg hover:scale-110 transition-all" onclick="document.documentElement.classList.toggle('dark')" data-theme-toggle>
<span class="material-symbols-outlined block dark:hidden">dark_mode</span>
